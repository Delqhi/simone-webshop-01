name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESLint
        run: npm run lint
        
      - name: Run Prettier check
        run: npm run format:check

  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: TypeScript type check
        run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run tests
        run: npm test
        
      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: true

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            build/

  docker-build:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/opendocs:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/opendocs:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Log Docker deployment notification
        run: |
          echo "🚀 DEPLOYMENT INITIATED"
          echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/opendocs:${{ github.sha }}"
          echo "Image Tag: ${{ secrets.DOCKERHUB_USERNAME }}/opendocs:latest"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo ""
          echo "📋 DEPLOYMENT OPTIONS:"
          echo "Option 1 - Self-Hosted VPS with Docker:"
          echo "  ssh deploy@your-server.com 'cd /opt/opendocs && docker pull ${{ secrets.DOCKERHUB_USERNAME }}/opendocs:latest && docker-compose up -d'"
          echo ""
          echo "Option 2 - Kubernetes:"
          echo "  kubectl set image deployment/opendocs opendocs=${{ secrets.DOCKERHUB_USERNAME }}/opendocs:${{ github.sha }} --record"
          echo ""
          echo "Option 3 - AWS ECS:"
          echo "  aws ecs update-service --cluster opendocs --service opendocs --force-new-deployment"
          echo ""
          echo "Option 4 - Webhook Notification:"
          echo "  curl -X POST \$WEBHOOK_URL -H 'Content-Type: application/json' -d '{\"image\":\"${{ secrets.DOCKERHUB_USERNAME }}/opendocs:latest\"}'"
          echo ""
          echo "✅ Docker image successfully pushed to Docker Hub"
          echo "🔑 Next step: Configure deployment method in GitHub Secrets"
          echo "📖 Refer to DEPLOYMENT.md for detailed setup instructions"
      
      - name: Verify Docker image availability
        run: |
          echo "🔍 Verifying Docker image on Docker Hub..."
          echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/opendocs:${{ github.sha }}"
          echo "Status: Ready for deployment"
      
      - name: Deployment success notification
        if: success()
        run: |
          echo "✅ DEPLOYMENT PIPELINE SUCCESSFUL"
          echo ""
          echo "Image Status: Published to Docker Hub"
          echo "Available Tags:"
          echo "  - ${{ secrets.DOCKERHUB_USERNAME }}/opendocs:latest"
          echo "  - ${{ secrets.DOCKERHUB_USERNAME }}/opendocs:${{ github.sha }}"
          echo ""
          echo "🚀 Ready for production deployment!"
          echo "📝 Configure your deployment target and update GitHub Secrets"
      
      - name: Deployment failure notification
        if: failure()
        run: |
          echo "❌ DEPLOYMENT PIPELINE FAILED"
          echo "Please check the logs above for details"