version: '3.8'

services:
  opendocs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - opendocs-network

  # Mock services since Docker is down
  n8n-mock:
    image: alpine:latest
    command: echo "n8n service would run here"
    networks:
      - opendocs-network

  supabase-mock:
    image: alpine:latest
    command: echo "Supabase service would run here"
    networks:
      - opendocs-network

  openclaw-mock:
    image: alpine:latest
    command: echo "OpenClaw service would run here"
    networks:
      - opendocs-network

networks:
  opendocs-network:
    driver: bridge